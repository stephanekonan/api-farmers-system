[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20", "mysql-client"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[variables]
PHP_VERSION = "8.2"
NODE_VERSION = "20"

[env]
PORT = "8080"
APP_ENV = "production"
APP_DEBUG = "false"
