version: '3.8'

services:
  # Laravel PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmers-api-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage/app:/var/www/html/storage/app
    networks:
      - farmers-network
    depends_on:
      - mysql
      - nginx
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=farmers_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret123
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: farmers-api-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - farmers-network
    depends_on:
      - app

  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: farmers-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: farmers_db
      MYSQL_USER: farmers_user
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - farmers-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: farmers-api-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - farmers-network

  # Laravel Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmers-api-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - farmers-network
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=farmers_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret123
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmers-api-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - farmers-network
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=farmers_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret123

networks:
  farmers-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
